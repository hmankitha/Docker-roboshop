services:
  catalogue:
    build:
      dockerfile: ./catalogue
    image: joindevops/catalogue:1.0.0
    container_name: catalogue
    depends_on:
    - mongodb

  user:
    build:
      dockerfile: ./user
    image: joindevops/user:1.0.0
    container_name: user
    depends_on:
    - redis

  frontend:
    build:
      dockerfile: ./frontend
    image: joindevops/frontend:1.0.0
    container_name: frontend
    ports:
    - "80:80"
    depends_on: 
    - catalogue
    - user

  mongodb:
    build: 
      dockerfile: ./mongodb
    image: joindevops/mongodb:1.0.0
    container_name: mongodb

  redis: 
    image: redis:7.0
    container_name: redis 

networks:
  default:
    driver: bridge
    name: roboshop
    external: false    