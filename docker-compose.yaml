services:
  catalogue:
    build: ./catalogue
    image: 7204492095/catalogue:1.0.0
    container_name: catalogue
    depends_on:
    - mongodb

  user:
    build: ./user
    image: 7204492095/user:1.0.0
    container_name: user
    depends_on:
    - redis
    - mongodb

  cart:
    build: ./cart
    image: 7204492095/cart:1.0.0
    container_name: cart 
    depends_on:
    - redis 
    - catalogue

  shipping:
    build: ./shipping
    image: 7204492095/shipping:1.0.0
    container_name: shipping
    depends_on: 
    - mysql 
    - cart

  payment:
    build: ./payment
    image: 7204492095/payment:1.0.0
    container_name: payment
    environment:
      CART_HOST: "cart"
      CART_PORT: "8080"
      USER_HOST: "user"
      USER_PORT: "8080"
      AMQP_HOST: "rabbitmq"
      AMPQ_USER: "roboshop"
      AMPQ_PASS: "roboshop123"
    depends_on:
    - rabbitmq
    - cart
    - user

  frontend:
    build: ./frontend
    image: 7204492095/frontend:1.0.0
    container_name: frontend
    ports:
    - "80:80"
    depends_on: 
    - catalogue
    - user
    - cart
    - shipping
    - payment


  mongodb:
    build: ./mongodb
    image: 7204492095/mongodb:1.0.0
    container_name: mongodb
    volumes:
    - mongodb: /data/db

  redis: 
    image: redis:7.0
    container_name: redis 
    volumes:
    - redis: /data 

  mysql:
    build: ./mysql
    image: 7204492095/mysql:1.0.0
    container_name: mysql
    volumes:
    - mysql: /var/lib/mysql


  rabbitmq:
    image: rabbitmq:3
    environment: 
      RABBITMQ_DEFAULT_USER: roboshop
      RABBITMQ_DEFAULT_PASS: roboshop123
    container_name: rabbitmq 
    volumes:
      - rabbitmq: /var/lib/rabbitmq

networks:
  default:
    driver: bridge
    name: roboshop
    external: false    

volumes:
  mongodb:
  redis:
  mysql:
  rabbitmq:      